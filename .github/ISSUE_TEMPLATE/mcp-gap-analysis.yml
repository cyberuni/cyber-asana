name: MCP gap analysis
description: Triage a change in the official Asana MCP tool catalog
title: "chore: official Asana MCP catalog changed"
labels:
  - mcp-gap-analysis
  - maintenance
body:
  - type: markdown
    attributes:
      value: |
        Use this template when the weekly watch or a manual fetch detects official MCP catalog drift.
  - type: checkboxes
    id: checklist
    attributes:
      label: Analysis checklist
      options:
        - label: Run `.agents/skills/analyze-official-asana-mcp` locally
          required: false
        - label: Run `pnpm --filter @cyberuni/gap-analysis run report -- --json` and review buckets
          required: false
        - label: Update `tools/gap-analysis/src/overlap-map.ts` if overlap pairs changed
          required: false
        - label: Update readme routing guidance if dual-MCP docs exist
          required: false
        - label: Refresh `tools/gap-analysis/data/official-asana-mcp-baseline.json` after analysis (`pnpm --filter @cyberuni/gap-analysis run fetch-official -- --write`)
          required: false
        - label: Open implementation PR or hand off to `update-asana-sdk` if cyber-asana needs new tools
          required: false
