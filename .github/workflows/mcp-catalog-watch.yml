name: mcp-catalog-watch
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print issue body without creating
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gap:fetch-official --json > /tmp/official.json
      - name: Diff against baseline
        id: diff
        continue-on-error: true
        run: |
          set +e
          pnpm gap:diff-official /tmp/official.json --json > /tmp/diff.json
          exit_code=$?
          set -e
          echo "changed=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            pnpm gap:diff-official /tmp/official.json --issue-body > /tmp/issue-body.md
          fi
      - name: Print issue body (dry run)
        if: steps.diff.outputs.changed != '0' && inputs.dry_run == true
        run: cat /tmp/issue-body.md
      - name: Open issue
        if: steps.diff.outputs.changed != '0' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create mcp-gap-analysis --color 0E8A16 --description "Official MCP catalog drift" 2>/dev/null || true
          gh label create maintenance --color C5DEF5 --description "Routine maintenance" 2>/dev/null || true
          if gh issue list --label mcp-gap-analysis --state open --json title --jq '.[].title' | grep -Fq 'official Asana MCP catalog changed'; then
            echo "Open issue already exists; skipping"
            exit 0
          fi
          gh issue create --title "chore: official Asana MCP catalog changed" \
            --label mcp-gap-analysis --label maintenance \
            --body-file /tmp/issue-body.md
